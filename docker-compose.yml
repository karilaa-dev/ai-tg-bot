services:
  bot:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_URL: sqlite:/app/data/bot.db
      BASH_WORKSPACE_ROOT: /app/data/bash
      PI_CODING_AGENT_DIR: /app/data/pi
      DOCLING_URL: http://docling:5001
    volumes:
      - bot-data:/app/data
      # Compatibility name: upgrades reuse the former Codex volume for Pi state.
      - codex-home:/app/data/pi
    depends_on:
      docling:
        condition: service_started
    restart: unless-stopped

  docling:
    image: quay.io/docling-project/docling-serve
    ports:
      - "5001:5001"
    restart: unless-stopped

volumes:
  bot-data:
  codex-home:
