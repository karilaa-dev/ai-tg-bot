services:
  bot:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_URL: sqlite:/app/data/bot.db
      BASH_WORKSPACE_ROOT: /app/data/bash
      AGENT_SHARED_ROOT: /data
      MANAGED_FILE_ROOT: /data/.chat-files
      OPEN_SANDBOX_DOMAIN: ${OPEN_SANDBOX_DOMAIN:-opensandbox-server:8080}
      OPEN_SANDBOX_PROTOCOL: ${OPEN_SANDBOX_PROTOCOL:-http}
      OPEN_SANDBOX_API_KEY: ${OPEN_SANDBOX_API_KEY:?set OPEN_SANDBOX_API_KEY}
      OPEN_SANDBOX_USE_SERVER_PROXY: ${OPEN_SANDBOX_USE_SERVER_PROXY:-true}
      OPEN_SANDBOX_SHARED_HOST_ROOT: ${BOT_SHARED_HOST_PATH:?set BOT_SHARED_HOST_PATH to the shared host folder}
      OPEN_SANDBOX_IMAGE: ${OPEN_SANDBOX_IMAGE:-ghcr.io/karilaa-dev/ai-agent-box:latest}
      OPEN_SANDBOX_UID: ${OPEN_SANDBOX_UID:-1000}
      OPEN_SANDBOX_GID: ${OPEN_SANDBOX_GID:-1000}
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
      PI_CODING_AGENT_DIR: /app/data/pi
    volumes:
      - bot-data:/app/data
      - type: bind
        source: ${BOT_SHARED_HOST_PATH:?set BOT_SHARED_HOST_PATH to the shared host folder}
        target: /data
        bind:
          create_host_path: false
      # Compatibility name: upgrades reuse the former Codex volume for Pi state.
      - codex-home:/app/data/pi
    networks:
      - opensandbox
    stop_grace_period: 60s
    restart: unless-stopped

volumes:
  bot-data:
  codex-home:

networks:
  opensandbox:
    name: ${OPEN_SANDBOX_NETWORK:-ai-tg-bot-opensandbox}
