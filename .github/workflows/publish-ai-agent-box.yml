name: Publish AI agent box

on:
  push:
    branches:
      - main
    paths:
      - 'docker/ai-agent-box/**'
      - '.github/workflows/publish-ai-agent-box.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-ai-agent-box-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: karilaa-dev/ai-agent-box

jobs:
  verify:
    name: Build and smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build smoke-test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./docker/ai-agent-box
          load: true
          tags: ai-agent-box:smoke
          cache-from: type=gha,scope=ai-agent-box
          cache-to: type=gha,mode=max,scope=ai-agent-box

      - name: Smoke test default process
        run: |
          container_id="$(docker run --detach ai-agent-box:smoke)"
          trap 'docker rm --force "${container_id}" >/dev/null' EXIT
          sleep 1
          test "$(docker inspect --format '{{.State.Running}}' "${container_id}")" = true

      - name: Smoke test tool contract
        run: docker run --rm --user 1000:1000 ai-agent-box:smoke /usr/local/bin/tool-contract.sh

      - name: Smoke test agent UID and GID
        run: |
          docker run --rm --user 1000:1000 ai-agent-box:smoke bash -lc '
            set -e
            test "$(id -u)" = 1000
            test "$(id -g)" = 1000
            test "$(id -un)" = agent
          '

  publish:
    name: Build and publish
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./docker/ai-agent-box
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ai-agent-box
          cache-to: type=gha,mode=max,scope=ai-agent-box
